<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Sync Stopwatch</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    :root[data-theme="dark"] {
      --bg: #09090b; --text: #fff; --panel: rgba(255,255,255,.05);
      --border: rgba(255,255,255,.1); --muted: rgba(255,255,255,.4);
      --green: #4ade80; --green-hover: #22c55e; --green-bg: rgba(74, 222, 128, 0.1);
      --red: #f87171; --red-hover: #ef4444; --red-bg: rgba(248, 113, 113, 0.1);
      --lap: #60a5fa; --lap-bg: rgba(96, 165, 250, 0.1);
    }
    :root[data-theme="light"] {
      --bg: #f4f4f5; --text: #09090b; --panel: rgba(0,0,0,.05);
      --border: rgba(0,0,0,.1); --muted: rgba(0,0,0,.5);
      --green: #16a34a; --green-hover: #15803d; --green-bg: rgba(22, 163, 74, 0.1);
      --red: #dc2626; --red-hover: #b91c1c; --red-bg: rgba(220, 38, 38, 0.1);
      --lap: #2563eb; --lap-bg: rgba(37, 99, 235, 0.1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100dvh;
      background: var(--bg); color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 6dvh; position: relative; overflow-y: auto; overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Top Bar */
    #top-bar {
      width: min(100%, 800px); padding: 0 24px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px; z-index: 10;
    }
    
    .room-badge {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel); border: 1px solid var(--border);
      padding: 6px 12px 6px 16px; border-radius: 999px; font-size: 11px; font-weight: 600;
      backdrop-filter: blur(10px);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .role-host { color: var(--green); }
    .role-viewer { color: var(--muted); }
    
    #btn-share {
      background: none; border: none; color: var(--text); padding: 4px 8px;
      border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;
      transition: background 0.2s; display: flex; align-items: center; gap: 6px;
    }
    #btn-share:hover { background: var(--border); }

    .toggles button {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
      margin-left: 6px; backdrop-filter: blur(10px); transition: 0.2s;
    }
    .toggles button:hover { background: var(--border); }

    /* Settings Modal */
    #settings-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px); z-index: 100;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    #settings-modal.show { opacity: 1; pointer-events: all; }
    
    .modal-content {
      background: var(--bg); border: 1px solid var(--border);
      width: min(90%, 360px); padding: 24px; border-radius: 20px;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #settings-modal.show .modal-content { transform: translateY(0); }
    
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .modal-header h2 { font-size: 18px; }
    .btn-close { background: none; border: none; font-size: 20px; color: var(--muted); cursor: pointer; }
    
    .setting-group { display: flex; flex-direction: column; gap: 8px; }
    .setting-group label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .setting-group select {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      padding: 12px; border-radius: 10px; font-family: inherit; font-size: 14px; width: 100%;
    }

    /* Countdown Stepper */
    #countdown-wrap { display: flex; align-items: center; justify-content: space-between; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
    .cd-btn { background: none; border: none; color: var(--text); font-size: 20px; width: 40px; height: 40px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
    .cd-btn:hover { background: var(--border); }
    #cd-display { font-size: 14px; font-weight: bold; }

    /* Timer Display - UPGRADED UX */
    #timer {
      font-size: clamp(4rem, 15vw, 9rem); font-weight: 700; line-height: 1;
      display: flex; align-items: baseline; justify-content: center;
      margin-bottom: 48px; z-index: 10;
      /* Forces numbers to not jump around */
      font-variant-numeric: tabular-nums; 
    }
    .sep { opacity: .3; margin: 0 2px; }
    /* Make milliseconds smaller and superscript */
    .frac { font-size: clamp(1.5rem, 5vw, 3rem); color: var(--muted); margin-left: 8px; }

    /* Glassmorphism Controls Grid */
    #controls {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      width: min(100%, 540px); padding: 0 24px; z-index: 10; margin-bottom: 48px;
    }
    .ctrl-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      padding: 24px 0; border-radius: 20px; border: 2px solid;
      font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: .1em;
      cursor: pointer; transition: all .2s; 
      /* Glass effect */
      background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .ctrl-btn svg { width: 28px; height: 28px; }
    .ctrl-btn:disabled { opacity: .2; cursor: not-allowed; transform: none !important; }

    #btn-start { border-color: rgba(74,222,128,.3); color: var(--green); }
    #btn-start:not(:disabled):hover { background: var(--green-bg); border-color: var(--green); transform: scale(1.02); }
    
    #btn-stop { border-color: var(--border); color: var(--text); }
    #btn-stop.active { border-color: rgba(239,68,68,.3); color: var(--red); }
    #btn-stop.active:hover { background: var(--red-bg); border-color: var(--red); transform: scale(1.02); }

    /* Make secondary buttons slightly shorter */
    #btn-lap, #btn-reset { padding: 16px 0; font-size: 10px; border-radius: 16px; }
    #btn-lap { border-color: rgba(96,165,250,.3); color: var(--lap); }
    #btn-lap:not(:disabled):hover { background: var(--lap-bg); border-color: var(--lap); transform: scale(1.02); }
    #btn-reset { border-color: var(--border); color: var(--muted); }
    #btn-reset:not(:disabled):hover { background: var(--panel); border-color: var(--text); color: var(--text); transform: scale(1.02); }

    /* Smart Laps List */
    #laps {
      width: min(100%, 540px); padding: 0 24px 60px; list-style: none;
      display: flex; flex-direction: column-reverse; z-index: 10;
    }
    #laps li {
      display: grid; grid-template-columns: 1fr 1fr 1fr; padding: 14px 0;
      border-bottom: 1px solid var(--border); font-size: 14px; font-variant-numeric: tabular-nums;
    }
    #laps li .lap-split { text-align: center; color: var(--muted); }
    #laps li .lap-tot { text-align: right; font-weight: bold; }
    
    /* Highlight Colors for Fastest/Slowest */
    #laps li.fastest { color: var(--green); }
    #laps li.fastest .lap-split { color: var(--green); }
    #laps li.slowest { color: var(--red); }
    #laps li.slowest .lap-split { color: var(--red); }

    /* Background Glow Effect */
    #glow {
      position: fixed; top: 50%; left: 50%; translate: -50% -50%;
      width: 60vw; height: 60vw; border-radius: 50%; filter: blur(140px);
      opacity: .06; pointer-events: none; transition: background 1s ease; z-index: 0;
    }
  </style>
</head>
<body>

<div id="top-bar">
  <div class="room-badge">
    <div class="dot"></div>
    <span id="room-display">Main</span>
    <span class="sep">|</span>
    <span id="role-display" class="role-viewer">Viewer</span>
    
    <!-- UX Fix: Easy Share Button -->
    <button id="btn-share" title="Copy Room Link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
      <span>Copy</span>
    </button>
  </div>
  
  <div class="toggles">
    <button id="btn-audio" title="Toggle Audio">🔊</button>
    <button id="btn-theme" title="Toggle Theme">🌓</button>
    <button id="btn-settings" title="Settings" style="display:none;">⚙️</button>
  </div>
</div>

<!-- Polished Settings Modal -->
<div id="settings-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Room Settings</h2>
      <button class="btn-close" id="btn-close-modal">&times;</button>
    </div>
    
    <div class="setting-group" id="perm-group">
      <label>Who Can Control Timer?</label>
      <select id="perm-select">
        <option value="host_only">🔒 Host Only (Me)</option>
        <option value="anyone">🌍 Everyone (Co-Hosts)</option>
      </select>
    </div>

    <div class="setting-group">
      <label>Timer Mode</label>
      <select id="mode-select">
        <option value="stopwatch">⏱ Stopwatch (Count Up)</option>
        <option value="countdown">⏳ Countdown (Count Down)</option>
      </select>
    </div>

    <div class="setting-group" id="countdown-settings" style="display:none;">
      <label>Countdown Duration</label>
      <div id="countdown-wrap">
        <button class="cd-btn" id="cd-minus">-</button>
        <span id="cd-display">1 min</span>
        <button class="cd-btn" id="cd-plus">+</button>
      </div>
    </div>
  </div>
</div>

<div id="timer">
  <span id="hh">00</span><span class="sep">:</span>
  <span id="mm">00</span><span class="sep">:</span>
  <span id="ss">00</span>
  <span class="frac">.<span id="ms">000</span></span>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btn-start" disabled>
    <svg fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>START
  </button>
  <button class="ctrl-btn" id="btn-stop" disabled>
    <svg fill="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>STOP
  </button>
  <button class="ctrl-btn" id="btn-lap" disabled>
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>LAP
  </button>
  <button class="ctrl-btn" id="btn-reset" disabled>
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>RESET
  </button>
</div>

<ul id="laps"></ul>
<div id="glow"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

  const urlParams = new URLSearchParams(window.location.search);
  const roomName = urlParams.get('room') || 'main';
  document.getElementById('room-display').textContent = roomName;

  const socket = io({ query: { room: roomName } });
  let state = {};
  let isHost = false;
  let raf = null;
  let timeOffset = 0; 

  // DOM Elements
  const $hh = document.getElementById('hh');
  const $mm = document.getElementById('mm');
  const $ss = document.getElementById('ss');
  const $ms = document.getElementById('ms');
  const $glow = document.getElementById('glow');
  const $laps = document.getElementById('laps');
  
  const $start = document.getElementById('btn-start');
  const $stop = document.getElementById('btn-stop');
  const $lap = document.getElementById('btn-lap');
  const $reset = document.getElementById('btn-reset');
  
  // Settings & Modal
  const $modal = document.getElementById('settings-modal');
  const $btnSettings = document.getElementById('btn-settings');
  const $btnCloseModal = document.getElementById('btn-close-modal');
  const $permSelect = document.getElementById('perm-select');
  const $modeSelect = document.getElementById('mode-select');
  const $cdSettings = document.getElementById('countdown-settings');
  const $cdDisplay = document.getElementById('cd-display');
  
  let cdVal = 1; // minutes

  // Audio Logic
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  const audioCtx = new AudioContext();
  let audioEnabled = true;

  document.getElementById('btn-audio').onclick = (e) => {
    audioEnabled = !audioEnabled;
    e.target.textContent = audioEnabled ? '🔊' : '🔇';
  };

  function playTone(type) {
    if (!audioEnabled || audioCtx.state === 'suspended') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    if (type === 'start') { osc.frequency.value = 880; osc.type = 'sine'; }
    if (type === 'stop') { osc.frequency.value = 440; osc.type = 'square'; }
    if (type === 'lap') { osc.frequency.value = 1200; osc.type = 'triangle'; }
    if (type === 'finish') { osc.frequency.value = 600; osc.type = 'sawtooth'; }
    
    gain.gain.setValueAtTime(1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
    
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  }

  // Copy Link UX
  const $btnShare = document.getElementById('btn-share');
  $btnShare.onclick = () => {
    navigator.clipboard.writeText(window.location.href);
    const span = $btnShare.querySelector('span');
    span.textContent = 'Copied!';
    setTimeout(() => span.textContent = 'Copy', 2000);
  };

  // Latency Sync
  function syncLatency() { socket.emit('sync_ping', Date.now()); }
  socket.on('sync_pong', (data) => {
    const rtt = Date.now() - data.clientTime;
    const serverTimeNow = data.serverTime + (rtt / 2);
    timeOffset = serverTimeNow - Date.now();
  });
  setInterval(syncLatency, 5000);

  // Formatting
  function formatTime(ms) {
    if (ms < 0) ms = 0;
    const h = String(Math.floor(ms / 3600000)).padStart(2, '0');
    const m = String(Math.floor((ms % 3600000) / 60000)).padStart(2, '0');
    const s = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
    const msec = String(ms % 1000).padStart(3, '0');
    return { h, m, s, msec };
  }

  function display(ms) {
    const t = formatTime(ms);
    // Hide hours if 0 to keep the display clean
    if (t.h === '00') {
      $hh.style.display = 'none'; $hh.nextElementSibling.style.display = 'none';
    } else {
      $hh.style.display = 'inline'; $hh.nextElementSibling.style.display = 'inline';
    }
    $hh.textContent = t.h; $mm.textContent = t.m;
    $ss.textContent = t.s; $ms.textContent = t.msec;
  }

  // Smart Laps Rendering
  function renderLaps(lapsArr) {
    $laps.innerHTML = '';
    if (lapsArr.length === 0) return;

    // Calculate splits to find fastest and slowest
    const splits = lapsArr.map((lap, i) => i === 0 ? lap : lap - lapsArr[i-1]);
    let minSplit = Infinity, maxSplit = -Infinity;
    
    // Only highlight if there are at least 2 laps
    if (lapsArr.length > 1) {
      minSplit = Math.min(...splits);
      maxSplit = Math.max(...splits);
    }

    lapsArr.forEach((lapMs, i) => {
      const splitMs = splits[i];
      const tTot = formatTime(lapMs);
      const tSplt = formatTime(splitMs);
      
      const li = document.createElement('li');
      
      // Apply color classes
      if (lapsArr.length > 1) {
        if (splitMs === minSplit) li.className = 'fastest';
        if (splitMs === maxSplit) li.className = 'slowest';
      }

      li.innerHTML = `
        <span class="lap-num">Lap ${i + 1}</span>
        <span class="lap-split">+${tSplt.m}:${tSplt.s}.${tSplt.msec}</span>
        <span class="lap-tot">${tTot.h !== '00' ? tTot.h+':' : ''}${tTot.m}:${tTot.s}.${tTot.msec}</span>
      `;
      $laps.appendChild(li);
    });
  }

  function tick() {
    if (state.isRunning) {
      const now = Date.now() + timeOffset;
      let currentElapsed = state.elapsed + (now - state.startTime);
      
      if (state.mode === 'countdown') {
        let remaining = state.countdownDuration - currentElapsed;
        if (remaining <= 0) {
          remaining = 0;
          if (isHost) socket.emit('stop'); 
          playTone('finish');
        }
        display(remaining);
      } else {
        display(currentElapsed);
      }
    }
    raf = requestAnimationFrame(tick);
  }

  // State Management
  socket.on('sync_state', s => {
    state = s;
    isHost = socket.id === state.host;
    const canControl = isHost || state.permission === 'anyone';
    
    document.getElementById('role-display').textContent = isHost ? 'Host' : (canControl ? 'Co-Host' : 'Viewer');
    document.getElementById('role-display').className = isHost ? 'role-host' : (canControl ? 'role-host' : 'role-viewer');
    
    // UI toggles
    $btnSettings.style.display = canControl ? 'block' : 'none';
    document.getElementById('perm-group').style.display = isHost ? 'flex' : 'none';
    $permSelect.value = state.permission;

    if (canControl) {
      $start.disabled = state.isRunning || (state.mode === 'countdown' && state.elapsed >= state.countdownDuration);
      $stop.disabled = !state.isRunning;
      $lap.disabled = !state.isRunning || state.mode === 'countdown';
      $reset.disabled = state.isRunning && state.elapsed === 0;
    } else {
      $start.disabled = $stop.disabled = $lap.disabled = $reset.disabled = true;
    }
    
    $stop.classList.toggle('active', state.isRunning);
    $glow.style.background = state.isRunning ? 'var(--green)' : state.elapsed > 0 ? 'var(--red)' : 'transparent';
    
    $modeSelect.value = state.mode;
    cdVal = state.countdownDuration / 60000;
    $cdDisplay.textContent = cdVal + ' min';
    $cdSettings.style.display = state.mode === 'countdown' ? 'flex' : 'none';

    renderLaps(state.laps);

    if (raf) cancelAnimationFrame(raf);
    
    if (state.isRunning) {
      raf = requestAnimationFrame(tick);
    } else {
      if (state.mode === 'countdown') {
        display(Math.max(0, state.countdownDuration - state.elapsed));
      } else {
        display(state.elapsed);
      }
    }
  });

  socket.on('audio_cue', type => playTone(type));

  // Settings Modal Logic
  $btnSettings.onclick = () => $modal.classList.add('show');
  $btnCloseModal.onclick = () => $modal.classList.remove('show');
  $modal.onclick = (e) => { if(e.target === $modal) $modal.classList.remove('show'); };

  // Event Listeners
  const unlockAudio = () => { if (audioCtx.state === 'suspended') audioCtx.resume(); };
  
  $start.onclick = () => { unlockAudio(); socket.emit('start'); };
  $stop.onclick  = () => { unlockAudio(); socket.emit('stop'); };
  $lap.onclick   = () => { unlockAudio(); socket.emit('lap'); };
  $reset.onclick = () => { unlockAudio(); socket.emit('reset'); };

  $permSelect.onchange = (e) => socket.emit('set_permission', e.target.value);
  $modeSelect.onchange = (e) => socket.emit('set_mode', { mode: e.target.value, duration: cdVal * 60000 });
  
  document.getElementById('cd-minus').onclick = () => {
    if(cdVal > 1) { cdVal--; socket.emit('set_mode', { mode: 'countdown', duration: cdVal * 60000 }); }
  };
  document.getElementById('cd-plus').onclick = () => {
    if(cdVal < 60) { cdVal++; socket.emit('set_mode', { mode: 'countdown', duration: cdVal * 60000 }); }
  };

  document.getElementById('btn-theme').onclick = () => {
    const root = document.documentElement;
    root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  };
</script>
</body>
</html>
