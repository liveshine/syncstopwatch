<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  const socket = io({
    reconnection: true,
    reconnectionDelay: 500,
    reconnectionDelayMax: 2000,
    reconnectionAttempts: Infinity
  });

  const $mm    = document.getElementById('mm');
  const $ss    = document.getElementById('ss');
  const $ms    = document.getElementById('ms');
  const $count = document.getElementById('count');
  const $glow  = document.getElementById('glow');
  const $start = document.getElementById('btn-start');
  const $stop  = document.getElementById('btn-stop');
  const $reset = document.getElementById('btn-reset');
  const $ping  = document.getElementById('ping-badge'); 

  let raf = null, t0 = null, elapsed = 0;

  function display(ms) {
    if (ms < 0) ms = 0;
    $mm.textContent = String(Math.floor(ms / 60000)).padStart(2, '0');
    $ss.textContent = String(Math.floor((ms % 60000) / 1000)).padStart(2, '0');
    $ms.textContent = String(ms % 1000).padStart(3, '0');
  }

  function tick() {
    elapsed = Date.now() - t0;
    display(elapsed);
    raf = requestAnimationFrame(tick);
  }

  function apply(running, offset, snap) {
    // 1. Update the official elapsed time if snapping
    if (snap !== undefined) { 
      elapsed = snap; 
      display(snap); 
    }

    // 2. Button Logic Check: Safely controls exactly when buttons can be pressed
    $start.disabled = running;
    $stop.disabled  = !running;
    $stop.classList.toggle('active', running);
    $reset.disabled = running || elapsed === 0; // Fixed: Cannot hit reset while running
    
    $glow.style.background = running ? '#4ade80' : elapsed > 0 ? '#ef4444' : 'transparent';

    if (raf) { cancelAnimationFrame(raf); raf = null; }

    // 3. CLOCK DRIFT FIX: Use the phone's local clock to run the visual timer
    if (running) {
      t0 = Date.now() - (offset || 0);
      raf = requestAnimationFrame(tick);
    } else {
      t0 = null;
    }
  }

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      if (!socket.connected) socket.connect();
      socket.emit('request_state');
    }
  });

  setInterval(() => {
    if (socket.connected) {
      const start = Date.now();
      socket.emit('ping_check', start, () => {
        const latency = Date.now() - start;
        $ping.textContent = `PING: ${latency} ms`;
        $ping.style.color = 'rgba(255,255,255,.5)';
      });
    } else {
      $ping.textContent = `DISCONNECTED`;
      $ping.style.color = '#ef4444';
    }
  }, 2000); 

  // Network Events
  socket.on('timer_state',   s   => apply(s.isRunning, s.elapsedSoFar));
  socket.on('timer_started', ()  => apply(true, 0)); // Starts instantly at 0
  socket.on('timer_stopped', dur => apply(false, null, dur));
  socket.on('timer_reset',   ()  => { elapsed = 0; apply(false, null, 0); });
  socket.on('connected_count', n => $count.textContent = n + ' CONNECTED');

  // Button Click Listeners
  $start.onclick = () => socket.emit('start_timer');
  $stop.onclick  = () => socket.emit('stop_timer');
  $reset.onclick = () => socket.emit('reset_timer');
</script>
